stages:
  - test
  - deploy

variables:
  # Base image for most jobs
  PLAYWRIGHT_IMAGE: mcr.microsoft.com/playwright:v1.52.0-jammy
  # Node version for non-playwright jobs
  NODE_VERSION: "20"

# Global cache for npm dependencies
cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

# ---------------------------------------------------------
# Job: UI Tests
# ---------------------------------------------------------
test:ui:
  stage: test
  image: $PLAYWRIGHT_IMAGE
  script:
    - npm ci
    # redundant "playwright install" removed as official image already contains browsers
    # Run tests
    - npm run test:all:chrome
  # Only Allure raw results: feeds the `pages` job. Skips Playwright HTML + test-results upload (faster, you use Allure URL in Slack).
  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"


# ---------------------------------------------------------
# Job: Generate Allure Report (GitLab Pages)
# Published site URL is available as CI_PAGES_URL in this job (use for Slack).
# ---------------------------------------------------------
pages:
  stage: deploy
  image: node:$NODE_VERSION
  needs:
    - job: test:ui
  before_script:
    # Headless JRE + no recommends keeps this job smaller and faster than default-jre.
    - apt-get update -qq && apt-get install -y --no-install-recommends default-jre-headless
    - npm install -g allure-commandline
  script:
    # Collect all allure-results from previous jobs
    - allure generate allure-results --clean -o public
  artifacts:
    paths:
      - public
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
