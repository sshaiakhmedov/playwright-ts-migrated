stages:
  - test
  - deploy

variables:
  # Base image for most jobs
  PLAYWRIGHT_IMAGE: mcr.microsoft.com/playwright:v1.52.0-jammy
  # Node version for non-playwright jobs
  NODE_VERSION: "20"

# Global cache for npm dependencies and Playwright browsers
cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
    - ~/.cache/ms-playwright/

# ---------------------------------------------------------
# Job: UI Tests (Sharded 4 ways)
# ---------------------------------------------------------
test:ui:
  stage: test
  image: $PLAYWRIGHT_IMAGE
  parallel: 4
  script:
    - npm ci
    # Install browsers ONLY if they are not in cache
    - npx playwright install --with-deps chromium webkit
    # Run shards
    - npx playwright test tests/ui --shard=$CI_NODE_INDEX/$CI_NODE_TOTAL
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
      - allure-results/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ---------------------------------------------------------
# Job: API Tests
# ---------------------------------------------------------
test:api:
  stage: test
  image: $PLAYWRIGHT_IMAGE
  script:
    - npm ci
    # API tests don't usually need browsers, but we use the playwright image anyway
    - npx playwright test tests/api
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
      - allure-results/
    expire_in: 30 days

# ---------------------------------------------------------
# Job: Generate Allure Report
# ---------------------------------------------------------
pages:
  stage: deploy
  image: node:$NODE_VERSION
  needs:
    - job: test:ui
    - job: test:api
  before_script:
    - npm install -g allure-commandline
  script:
    # Collect all allure-results from previous jobs
    - allure generate allure-results --clean -o public
  artifacts:
    paths:
      - public
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
