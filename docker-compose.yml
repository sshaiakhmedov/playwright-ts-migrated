
services:
  db:
    image: postgres:15-alpine
    container_name: pw-ts-postgres-test
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: api_db
    ports:
      - "5432:5432"
    volumes:
      # Map the initialization script so it runs on first startup
      - ./init-db/setup.sql:/docker-entrypoint-initdb.d/setup.sql
      - pgdata:/var/lib/postgresql/data

  postgrest:
    image: postgrest/postgrest
    container_name: pw-ts-postgrest-api
    ports:
      - "3000:3000"
    environment:
      # The authenticator user and password we created in setup.sql
      PGRST_DB_URI: postgres://authenticator:secretpassword@db:5432/api_db
      PGRST_DB_SCHEMA: api
      PGRST_DB_ANON_ROLE: web_anon
    depends_on:
      - db

volumes:
  pgdata:
